<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>临时粘贴板</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: auto;
        }
        #paste-area {
            /* border: 2px dashed #ccc; */
            width: 100%;
            height: 100%;
            /* padding: 20px; */
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            justify-content: center;
            overflow-y: auto;
            position: relative;
        }
        #background-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            font-size: 30px;
            align-items: center;
            justify-content: center;
            color: #ccc;
            pointer-events: none; /* 确保背景文本不影响粘贴操作 */
            z-index: 1;
        }
        #content-container {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            justify-content: center;
        }
        .pasted-image {
            margin: 10px;
            max-width: calc(33% - 20px); /* 每行最多3张图片，根据需要调整 */
            height: auto;
        }
        .pasted-text {
            margin: 10px;
            white-space: pre-wrap; /* 保留文本的换行符 */
            flex: 1 1 100%; /* 文本内容占满一行 */
        }
    </style>
</head>
<body>
    <!-- <h1>粘贴内容到页面上</h1> -->
    <div id="paste-area">
        <div id="background-text">将内容粘贴到这里</div>
        <div id="content-container"></div>
    </div>

    <script>
        const pasteArea = document.getElementById('paste-area');
        const contentContainer = document.getElementById('content-container');

        // 监听粘贴事件
        window.addEventListener('paste', (e) => {
            e.preventDefault(); // 阻止默认的粘贴行为

            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            let hasImage = false;

            for (let i = 0; i < items.length; i++) {
                const item = items[i];
                if (item.type.indexOf('image') === 0) {
                    hasImage = true;
                    const blob = item.getAsFile();
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const img = document.createElement('img');
                        img.src = event.target.result;
                        img.classList.add('pasted-image');
                        contentContainer.appendChild(img);
                        scrollToBottom(); // 滚动到页面底部
                    };
                    reader.readAsDataURL(blob);
                }
            }

            if (!hasImage) {
                // 如果没有图片，则处理文本粘贴
                const text = (e.clipboardData || e.originalEvent.clipboardData).getData('text/plain');
                const textDiv = document.createElement('div');
                textDiv.textContent = text;
                textDiv.classList.add('pasted-text');
                contentContainer.appendChild(textDiv);
                scrollToBottom(); // 滚动到页面底部
            }
        });

        // 滚动到页面底部的函数
        function scrollToBottom() {
            pasteArea.scrollTop = pasteArea.scrollHeight;
        }
    </script>
</body>
</html>
